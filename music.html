  .tint {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, transparent 0%, rgba(0,0,0,0.18) 100%);
    z-index: 1;
    pointer-events: none;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
  }

  .hud {
    position: fixed;
    z-index: 10;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 28px;
    align-items: center;
    pointer-events: none;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .hud-label {
    font-family: 'Oswald', sans-serif;
    font-weight: 200;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(120, 180, 255, 0.5);
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: rgba(160, 220, 255, 0.85);
    text-shadow: 0 0 10px rgba(100, 180, 255, 0.6);
  }

  .hud-sep {
    width: 1px;
    height: 30px;
    background: rgba(80, 140, 255, 0.2);
  }

  .scale-btns {
    position: fixed;
    z-index: 10;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }

  .scale-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    padding: 5px 12px;
    background: rgba(10, 30, 80, 0.6);
    border: 1px solid rgba(80, 140, 255, 0.3);
    color: rgba(120, 180, 255, 0.6);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .scale-btn:hover, .scale-btn.active {
    background: rgba(30, 80, 180, 0.5);
    border-color: rgba(160, 220, 255, 0.7);
    color: rgba(200, 235, 255, 0.95);
    box-shadow: 0 0 12px rgba(100, 180, 255, 0.3);
  }

  .bpm-ctrl {
    position: fixed;
    z-index: 10;
    top: 22px;
    right: 28px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
  }

  .bpm-ctrl label {
    font-family: 'Oswald', sans-serif;
    font-weight: 200;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(120, 180, 255, 0.5);
    text-transform: uppercase;
  }

  .bpm-ctrl input[type=range] {
    -webkit-appearance: none;
    width: 110px;
    height: 2px;
    background: rgba(80, 140, 255, 0.3);
    outline: none;
    cursor: pointer;
  }

  .bpm-ctrl input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(160, 220, 255, 0.9);
    box-shadow: 0 0 8px rgba(100, 180, 255, 0.8);
  }

  .bpm-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: rgba(160, 220, 255, 0.8);
  }

  .start-overlay {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(0, 5, 20, 0.72);
    cursor: pointer;
    transition: opacity 0.8s;
  }

  .start-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 200;
    font-size: clamp(1.8rem, 4vw, 3rem);
    letter-spacing: 0.5em;
    color: rgba(160, 220, 255, 0.9);
    text-shadow: 0 0 30px rgba(100, 180, 255, 0.5);
    text-transform: uppercase;
  }

  .start-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    color: rgba(100, 160, 255, 0.6);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .start-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="wall"></div>
<div class="tint"></div>
<canvas id="c"></canvas>

<div class="scale-btns">
  <button class="scale-btn active" data-scale="blues">Blues</button>
  <button class="scale-btn" data-scale="enigmatic">Enigmatic</button>
  <button class="scale-btn" data-scale="major_pent">Major Pent.</button>
  <button class="scale-btn" data-scale="minor_pent">Minor Pent.</button>
</div>

<div class="bpm-ctrl">
  <label>Tempo</label>
  <input type="range" id="bpmSlider" min="70" max="95" value="80">
  <span class="bpm-val" id="bpmVal">80 BPM</span>
</div>

<div class="hud">
  <div class="hud-item">
    <span class="hud-label">Scale</span>
    <span class="hud-value" id="hudScale">BLUES</span>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-item">
    <span class="hud-label">BPM</span>
    <span class="hud-value" id="hudBpm">80</span>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-item">
    <span class="hud-label">Shapes</span>
    <span class="hud-value" id="hudShapes">0</span>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-item">
    <span class="hud-label">Note</span>
    <span class="hud-value" id="hudNote">—</span>
  </div>
</div>

<div class="start-overlay" id="startOverlay">
  <div class="start-title">Deutsch Station</div>
  <div class="start-sub">[ click anywhere to begin ]</div>
</div>

<script>
// ── Audio ──────────────────────────────────────────────────────
let audioCtx = null, masterGain = null, started = false;

const SCALES = {
  blues:       [0, 3, 5, 6, 7, 10, 12, 15, 17],
  enigmatic:   [0, 1, 4, 6, 8, 10, 11, 12],
  major_pent:  [0, 2, 4, 7, 9, 12, 14, 16],
  minor_pent:  [0, 3, 5, 7, 10, 12, 15, 17],
};
const NOTE_NAMES_MAP = {
  blues: 'BLUES', enigmatic: 'ENIGMATIC', major_pent: 'MAJ. PENT.', minor_pent: 'MIN. PENT.'
};
const NOTE_LABELS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

let currentScale = 'blues';
let bpm = 80;
let beatInterval = 60000 / bpm;

function midiToHz(m) { return 261.63 * Math.pow(2, m / 12); }
function getScaleFreqs(oct) { return SCALES[currentScale].map(n => midiToHz(n + oct * 12)); }

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.2;

  // Reverb
  const conv = audioCtx.createConvolver();
  const len = audioCtx.sampleRate * 2.8;
  const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
  }
  conv.buffer = buf;
  const rvbGain = audioCtx.createGain();
  rvbGain.gain.value = 0.4;
  masterGain.connect(conv);
  conv.connect(rvbGain);
  rvbGain.connect(audioCtx.destination);
  masterGain.connect(audioCtx.destination);
}

function playTone(freq, dur, vol, type, atk) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + (atk || 0.02));
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(g); g.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + dur + 0.05);
}

// Ambient sequencer
let ambStep = 0, lastBeat = 0;
function ambientTick(ts) {
  if (!started) return;
  if (ts - lastBeat >= beatInterval * 0.5) {
    lastBeat = ts;
    const freqs = getScaleFreqs(-1);
    const f = freqs[ambStep % freqs.length];
    playTone(f, (beatInterval / 1000) * 1.8, 0.055, 'sine', 0.1);
    if (ambStep % 4 === 0) playTone(f * 1.498, (beatInterval / 1000) * 1.2, 0.03, 'triangle', 0.15);
    spawnBeatShape(f, freqs.length);
    ambStep++;
  }
  requestAnimationFrame(ambientTick);
}

// ── Canvas ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, mx = 0, my = 0;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const shapes = [];
const TYPES = ['triangle','hexagon','diamond','square','pentagon','star'];
function rnd(a,b){return a+Math.random()*(b-a);}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

const BLUES_PALETTE = [
  'rgba(40,120,220,', 'rgba(60,160,255,', 'rgba(20,80,180,',
  'rgba(100,200,255,', 'rgba(30,100,200,', 'rgba(140,215,255,',
  'rgba(80,140,240,', 'rgba(50,90,200,'
];

function makeShape(x, y, fromMouse) {
  return {
    x, y, fromMouse,
    type: pick(TYPES),
    size: rnd(fromMouse ? 16 : 10, fromMouse ? 50 : 38),
    vx: rnd(-0.5, 0.5),
    vy: rnd(-0.65, -0.18),
    rot: rnd(0, Math.PI*2),
    rs: rnd(-0.01, 0.01),
    col: pick(BLUES_PALETTE),
    alpha: rnd(0.3, 0.75),
    life: rnd(200, 400),
    age: 0
  };
}

function spawnBeatShape(freq, total) {
  if (shapes.length >= 65) shapes.splice(0, 4);
  const idx = SCALES[currentScale].findIndex(n => midiToHz(n - 12) === freq || Math.abs(midiToHz(n - 12) - freq) < 1);
  const xRatio = (ambStep % (total || 8)) / ((total || 8) - 1 || 1);
  const x = W * 0.08 + W * 0.84 * xRatio + rnd(-50, 50);
  shapes.push(makeShape(x, H * 0.72 + rnd(-30, 30), false));
}

// Shape drawers
function polygon(n, x, y, r, rot) {
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const a = rot + (i/n)*Math.PI*2;
    i===0 ? ctx.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r)
           : ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
  }
  ctx.closePath();
}

function diamond(x, y, r, rot) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  ctx.beginPath();
  ctx.moveTo(0,-r); ctx.lineTo(r*0.58,0);
  ctx.lineTo(0,r);  ctx.lineTo(-r*0.58,0);
  ctx.closePath(); ctx.restore();
}

function star(x, y, r, rot) {
  const ir = r*0.42;
  ctx.beginPath();
  for (let i=0;i<10;i++){
    const a=rot+(i/10)*Math.PI*2;
    const rr=i%2===0?r:ir;
    i===0?ctx.moveTo(x+Math.cos(a)*rr, y+Math.sin(a)*rr)
         :ctx.lineTo(x+Math.cos(a)*rr, y+Math.sin(a)*rr);
  }
  ctx.closePath();
}

function drawShape(s) {
  const p = s.age / s.life;
  const fade = p < 0.1 ? p/0.1 : p > 0.72 ? 1-(p-0.72)/0.28 : 1;
  const a = s.alpha * fade;
  ctx.save();
  ctx.strokeStyle = s.col + a + ')';
  ctx.lineWidth = s.fromMouse ? 1.1 : 0.75;
  ctx.shadowColor = s.col + Math.min(a*0.7, 0.45) + ')';
  ctx.shadowBlur = s.fromMouse ? 9 : 5;
  switch(s.type) {
    case 'triangle': polygon(3,s.x,s.y,s.size,s.rot); break;
    case 'hexagon':  polygon(6,s.x,s.y,s.size,s.rot); break;
    case 'pentagon': polygon(5,s.x,s.y,s.size,s.rot); break;
    case 'square':   polygon(4,s.x,s.y,s.size,s.rot); break;
    case 'diamond':  diamond(s.x,s.y,s.size,s.rot);    break;
    case 'star':     star(s.x,s.y,s.size,s.rot);       break;
  }
  ctx.stroke();
  ctx.restore();
}

// ── Hover notes ────────────────────────────────────────────────
let lastHoverNote = 0;
canvas.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  if (!started) return;
  const now = Date.now();
  if (now - lastHoverNote < beatInterval * 0.32) return;
  lastHoverNote = now;

  const all = [...getScaleFreqs(0), ...getScaleFreqs(1)];
  const idx = Math.min(Math.floor((mx / W) * all.length), all.length-1);
  const freq = all[idx];
  const semi = Math.round(12 * Math.log2(freq / 261.63));
  document.getElementById('hudNote').textContent = NOTE_LABELS[((semi%12)+12)%12];
  playTone(freq, 0.38, 0.13, 'triangle', 0.012);
  if (shapes.length < 65) shapes.push(makeShape(mx, my, true));
});

// ── Main render loop ───────────────────────────────────────────
function loop() {
  ctx.clearRect(0,0,W,H);
  for (let i = shapes.length-1; i >= 0; i--) {
    const s = shapes[i];
    s.x += s.vx; s.y += s.vy; s.rot += s.rs; s.age++;
    if (s.age >= s.life || s.y < -90 || s.x < -90 || s.x > W+90) { shapes.splice(i,1); continue; }
    drawShape(s);
  }
  document.getElementById('hudShapes').textContent = shapes.length;
  requestAnimationFrame(loop);
}

// ── Controls ───────────────────────────────────────────────────
document.getElementById('bpmSlider').addEventListener('input', function() {
  bpm = parseInt(this.value);
  beatInterval = 60000 / bpm;
  document.getElementById('bpmVal').textContent = bpm + ' BPM';
  document.getElementById('hudBpm').textContent = bpm;
});

document.querySelectorAll('.scale-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentScale = btn.dataset.scale;
    document.getElementById('hudScale').textContent = NOTE_NAMES_MAP[currentScale];
  });
});

document.getElementById('startOverlay').addEventListener('click', () => {
  if (started) return;
  started = true;
  initAudio();
  requestAnimationFrame(ambientTick);
  document.getElementById('startOverlay').classList.add('hidden');
});

loop();
</script>
</body>
</html>
